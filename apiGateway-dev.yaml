spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: transaction-service
          uri: lb://transactionService
          predicates:
            - Path=/transaction/**
          filters:
            - StripPrefix=1

        - id: sar-service
          uri: lb://sarReport
          predicates:
            - Path=/generate/**
          filters:
            - StripPrefix=1

        - id: alertcase-service
          uri: lb://alert-case-service
          predicates:
            - Path=/msg/**
          filters:
            - StripPrefix=1

        - id: enrichment-service
          uri: lb://enrichmentService
          predicates:
            - Path=/enrich/**
          filters:
            - StripPrefix=1

        - id: decision-engine-service
          uri: lb://gemini_test_try2
          predicates:
            - Path=/decision/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: INFO
