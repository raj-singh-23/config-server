spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: transaction-service
              uri: lb://transactionService
              predicates:
                - Path=/api/transactions/**

            - id: customer-service
              uri: lb://transactionService
              predicates:
                - Path=/api/customers/**

            - id: enrichment-service
              uri: lb://enrichmentService
              predicates:
                - Path=/api/enrich/**

            - id: decision-engine-service
              uri: lb://gemini_test_try2
              predicates:
                - Path=/api/gemini/**

            - id: alertcase-service
              uri: lb://alert-case-service
              predicates:
                - Path=/api/investigation/**

            - id: sar-service
              uri: lb://sarReport
              predicates:
                - Path=/sar/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: INFO
