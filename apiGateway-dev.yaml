spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: transaction-service
              uri: http://localhost:8089
              predicates:
                - Path=/transaction/**
              filters:
                - StripPrefix=1

            - id: sar-service
              uri: http://localhost:8088
              predicates:
                - Path=/generate/**
              filters:
                - StripPrefix=1

            - id: alertcase-service
              uri: http://localhost:8085
              predicates:
                - Path=/msg/**
              filters:
                - StripPrefix=1

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: INFO
